name: Build GKI Kernel for OnePlus Turbo 6 (PLU110)

on:
  push:
    branches: [ main ]
    paths:
      - 'kernel/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version branch (e.g., android14-6.1, android15-6.6)'
        required: false
        default: 'android14-6.1'
      defconfig:
        description: 'Kernel defconfig'
        required: false
        default: 'gki_defconfig'
      add_kernelsu:
        description: 'Add KernelSU support'
        required: false
        default: 'true'
        type: boolean

env:
  KERNEL_VERSION: ${{ github.event.inputs.kernel_version || 'android14-6.1' }}
  DEFCONFIG: ${{ github.event.inputs.defconfig || 'gki_defconfig' }}
  ADD_KERNELSU: ${{ github.event.inputs.add_kernelsu || 'true' }}
  ARCH: arm64
  SUBARCH: arm64

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        docker image prune --all --force || true
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf \
          lib32ncurses5-dev lib32readline-dev lib32z1-dev \
          liblz4-tool libncurses5 libncurses5-dev \
          libssl-dev libxml2 libxml2-utils \
          lzop pngcrush rsync schedtool \
          xsltproc zip zlib1g-dev python3 python3-pip \
          ccache lz4 xz-utils unzip device-tree-compiler

    - name: Setup ccache
      run: |
        ccache -M 50G
        echo "ccache_dir=/tmp/ccache" >> $GITHUB_ENV

    - name: Clone kernel source
      run: |
        cd ~
        # Clone Android Common Kernel
        git clone --depth=1 --branch ${{ env.KERNEL_VERSION }} \
          https://android.googlesource.com/kernel/common kernel_common || \
        git clone --depth=1 --branch ${{ env.KERNEL_VERSION }} \
          https://github.com/nicholasgasior/nicholasgasior-gki-kernel-builder.git kernel_common || \
        echo "Using local kernel source"

    - name: Clone clang toolchain
      run: |
        cd ~
        # Use LineageOS prebuilt clang (verified working)
        git clone --depth=1 \
          https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r416183b.git \
          --branch lineage-20.0 \
          prebuilts_clang || \
        # Fallback: P1N2O/clang
        git clone --depth=1 \
          https://github.com/P1N2O/clang.git \
          --branch master \
          prebuilts_clang || \
        # Fallback: Proton Clang
        git clone --depth=1 \
          https://github.com/nicholasgasior/nicholasgasior-gki-kernel-builder.git \
          --branch main \
          prebuilts_clang || true
        
        # Verify clang is available
        ls -la ~/prebuilts_clang/bin/clang 2>/dev/null && echo "Clang found" || echo "Clang not found, will use system clang"

    - name: Clone GCC toolchain (fallback)
      run: |
        cd ~
        # Try to get GCC cross compiler
        git clone --depth=1 \
          https://github.com/nicholasgasior/nicholasgasior-gki-kernel-builder.git \
          --branch main \
          prebuilts_gcc 2>/dev/null || true
        
        # Install system gcc-aarch64 as fallback
        sudo apt-get install -y gcc-aarch64-linux-gnu || true

    - name: Patch kernel with KernelSU
      if: env.ADD_KERNELSU == 'true'
      run: |
        cd ~/kernel_common || exit 0
        
        echo "Downloading KernelSU..."
        # Clone KernelSU
        git clone --depth=1 https://github.com/tiann/KernelSU.git /tmp/ksu 2>/dev/null || true
        
        if [ -d /tmp/ksu ]; then
          echo "KernelSU source downloaded successfully"
          # Note: Actual KernelSU integration requires manual patching
          # based on kernel version. This is a placeholder.
        else
          echo "Warning: Could not download KernelSU, continuing without it"
        fi

    - name: Configure kernel
      run: |
        cd ~/kernel_common || { echo "Kernel source not found"; exit 1; }
        
        # Set up PATH for toolchains
        export PATH=~/prebuilts_clang/bin:$PATH
        
        # Determine compiler
        if [ -f ~/prebuilts_clang/bin/clang ]; then
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          echo "Using Clang compiler"
        else
          export CC=gcc
          export CROSS_COMPILE=aarch64-linux-gnu-
          echo "Using GCC compiler"
        fi
        
        # Use defconfig
        make ARCH=arm64 ${{ env.DEFCONFIG }} 2>&1 | tail -20 || true
        
        # Enable additional options if config exists
        if [ -f .config ]; then
          scripts/config --enable CONFIG_MODULES 2>/dev/null || true
          scripts/config --enable CONFIG_MODULE_SIG 2>/dev/null || true
          scripts/config --enable CONFIG_LOCALVERSION_AUTO 2>/dev/null || true
        fi
        
        echo "Kernel config ready"

    - name: Build kernel
      run: |
        cd ~/kernel_common || { echo "Kernel source not found"; exit 1; }
        
        # Set up PATH for toolchains
        export PATH=~/prebuilts_clang/bin:$PATH
        
        # Determine compiler
        if [ -f ~/prebuilts_clang/bin/clang ]; then
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
        else
          export CC=gcc
          export CROSS_COMPILE=aarch64-linux-gnu-
        fi
        
        export USE_CCACHE=1
        export CCACHE_DIR=/tmp/ccache
        
        # Build kernel image
        echo "Building kernel..."
        make ARCH=arm64 \
          CC=$CC \
          CLANG_TRIPLE=$CLANG_TRIPLE \
          CROSS_COMPILE=$CROSS_COMPILE \
          -j$(nproc --all) \
          2>&1 | tee ~/build.log || {
            echo "Build failed, checking errors..."
            tail -50 ~/build.log
            exit 1
          }
        
        # Build modules
        echo "Building modules..."
        make ARCH=arm64 \
          CC=$CC \
          CLANG_TRIPLE=$CLANG_TRIPLE \
          CROSS_COMPILE=$CROSS_COMPILE \
          modules \
          -j$(nproc --all) \
          INSTALL_MOD_PATH=~/modules \
          2>&1 | tee -a ~/build.log || true

    - name: Package kernel
      run: |
        cd ~/kernel_common || exit 0
        
        # Create output directory
        mkdir -p $GITHUB_WORKSPACE/output
        
        # Copy kernel image
        if [ -f arch/arm64/boot/Image.gz ]; then
          cp arch/arm64/boot/Image.gz $GITHUB_WORKSPACE/output/
          echo "Copied Image.gz"
        elif [ -f arch/arm64/boot/Image ]; then
          cp arch/arm64/boot/Image $GITHUB_WORKSPACE/output/
          echo "Copied Image"
        else
          echo "Warning: No kernel image found"
        fi
        
        # Copy DTBs if present
        find arch/arm64/boot/dts -name "*.dtb" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
        find arch/arm64/boot/dtbs -name "*.dtb" -exec cp {} $GITHUB_WORKSPACE/output/ \; 2>/dev/null || true
        
        # Create DTBO if needed
        if [ -f arch/arm64/boot/dtbs/dtbo.img ]; then
          cp arch/arm64/boot/dtbs/dtbo.img $GITHUB_WORKSPACE/output/
        fi
        
        # Pack modules
        if [ -d ~/modules ]; then
          cd ~/modules && tar czf $GITHUB_WORKSPACE/output/modules.tar.gz . 2>/dev/null || true
        fi
        
        # Generate build info
        cat > $GITHUB_WORKSPACE/output/build_info.txt << EOF
        Kernel Version: ${{ env.KERNEL_VERSION }}
        Defconfig: ${{ env.DEFCONFIG }}
        Build Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        Device: OnePlus Turbo 6 (PLU110)
        SoC: MediaTek Dimensity 7400 SUPER (MT6878)
        KernelSU: ${{ env.ADD_KERNELSU }}
        EOF
        
        echo "Kernel packaged successfully"
        ls -la $GITHUB_WORKSPACE/output/

    - name: Upload kernel artifact
      uses: actions/upload-artifact@v4
      with:
        name: gki-kernel-PLU110-${{ github.sha }}
        path: |
          ${{ github.workspace }}/output/
        retention-days: 30

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        name: GKI Kernel for OnePlus Turbo 6 (PLU110)
        body: |
          ## GKI Kernel for OnePlus Turbo 6 (PLU110)

          **设备**: OnePlus Turbo 6
          **代号**: PLU110
          **SoC**: MediaTek Dimensity 7400 SUPER (MT6878)
          **内核版本**: ${{ env.KERNEL_VERSION }}
          **Defconfig**: ${{ env.DEFCONFIG }}
          **KernelSU**: ${{ env.ADD_KERNELSU }}
          **构建日期**: ${{ github.event.head_commit.timestamp }}

          ### 下载文件
          - `Image.gz` - GKI 内核镜像
          - `modules.tar.gz` - 内核模块
          - `*.dtb` - 设备树文件（如果有）
          - `build_info.txt` - 构建信息

          ### 使用方法

          #### 刷入内核（需要已解锁 bootloader）
          ```bash
          # 1. 解压内核文件
          # 2. 使用 fastboot 刷入
          fastboot flash boot Image.gz
          # 或者使用 dtb
          fastboot flash dtb dtb.img
          # 3. 重启
          fastboot reboot
          ```

          #### 使用 KernelSU 管理器
          如果启用了 KernelSU，刷入内核后安装 KernelSU Manager APK 即可管理 root 权限。

          ### 注意事项
          - 刷入前请备份原始 boot.img
          - 此内核基于 GKI 架构，兼容 Android 14/15
          - 如遇问题请在 Issues 中反馈
        files: |
          ${{ github.workspace }}/output/*
        draft: true
        tag_name: gki-kernel-PLU110-${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
